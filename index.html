<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اختيار النكهات</title>

  <style>
    body {
      font-family: "Tahoma", sans-serif;
      background: #fff7c2;
      padding: 30px;
      text-align: center;
    }

    h1 {
      color: #b8860b;
      margin-bottom: 25px;
      font-size: 32px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 15px auto;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      font-size: 20px;
    }

    button {
      background: #ffcc00;
      border: none;
      padding: 12px 25px;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
      margin-top: 20px;
      transition: 0.2s;
    }

    button:hover {
      background: #e6b800;
      transform: scale(1.05);
    }

    #result {
      margin-top: 25px;
      font-size: 22px;
      line-height: 1.8;
      color: #333;
    }
  </style>
</head>
<body>

  <h1>اختيار النكهات للشخصيات</h1>

  <button onclick="randomize()">اضغط لاختيار النكهات</button>

  <div id="result"></div>

  <script>
    const flavors = ["حامض", "حار", "حلو"];

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function randomize() {
      const shuffled = shuffle([...flavors]);

      const mohammed = shuffled[0];
      const mozn = shuffled[1];
      const elyan = shuffled[2];

      document.getElementById("result").innerHTML =
        `<div class='box'>محمد: ${mohammed}</div>
         <div class='box'>خر: ${mozn}</div>
         <div class='box'>احسن بنت في  العالم: ${elyan}</div>`;
    }
  </script>

</body>
</html>
